<!DOCTYPE html>
<html>
<head>
  <title>Your Buy Box - VaultForge</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto; padding: 20px; background: #0f172a; color: #fff; }
   .form-card { background: #1e293b; padding: 24px; border-radius: 12px; border: 1px solid #334155; }
    label { display: block; margin: 16px 0 6px; font-weight: bold; color: #cbd5e1; }
    input, select { width: 100%; padding: 12px; border: 1px solid #475569; border-radius: 8px; background: #0f172a; color: #fff; }
   .checkbox-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
   .checkbox-row { display: flex; align-items: center; }
   .checkbox-row input { width: auto; margin-right: 8px; }
   .save-status { position: fixed; bottom: 20px; right: 20px; background: #22c55e; color: #000; padding: 8px 16px; border-radius: 20px; font-size: 14px; opacity: 0; transition: opacity 0.3s; }
   .save-status.show { opacity: 1; }
  </style>
</head>
<body>
  <div class="form-card">
    <h2>YOUR BUY BOX</h2>
    <p style="color:#94a3b8;">Set once. We route deals to you forever. Auto-saves.</p>

    <form id="buyBoxForm">
      <label>Primary State</label>
      <select id="primaryState">
        <option value="TX">Texas</option>
        <option value="GA">Georgia</option>
        <option value="FL">Florida</option>
        <option value="CA">California</option>
      </select>

      <label>Also do business in:</label>
      <div class="checkbox-grid">
        <div class="checkbox-row"><input type="checkbox" id="stateTX" value="TX"><label for="stateTX">Texas</label></div>
        <div class="checkbox-row"><input type="checkbox" id="stateGA" value="GA"><label for="stateGA">Georgia</label></div>
        <div class="checkbox-row"><input type="checkbox" id="stateFL" value="FL"><label for="stateFL">Florida</label></div>
        <div class="checkbox-row"><input type="checkbox" id="stateCA" value="CA"><label for="stateCA">California</label></div>
      </div>

      <label>Role</label>
      <div class="checkbox-grid">
        <div class="checkbox-row"><input type="checkbox" id="roleBuyer" checked><label for="roleBuyer">Buyer</label></div>
        <div class="checkbox-row"><input type="checkbox" id="roleSeller"><label for="roleSeller">Seller</label></div>
        <div class="checkbox-row"><input type="checkbox" id="roleBroker"><label for="roleBroker">Broker</label></div>
      </div>

      <div id="brokerFields" style="display:none;">
        <label>Broker License State</label>
        <select id="brokerState"><option value="TX">TX</option><option value="GA">GA</option></select>
        <label>License #</label>
        <input type="text" id="brokerLicense">
      </div>

      <label>Budget Range</label>
      <div style="display:flex; gap:10px;">
        <input type="number" id="budgetMin" placeholder="150000">
        <input type="number" id="budgetMax" placeholder="300000">
      </div>

      <label>Strategy</label>
      <div class="checkbox-grid">
        <div class="checkbox-row"><input type="checkbox" id="stratFlip" checked><label for="stratFlip">Fix & Flip</label></div>
        <div class="checkbox-row"><input type="checkbox" id="stratHold"><label for="stratHold">Buy & Hold</label></div>
        <div class="checkbox-row"><input type="checkbox" id="stratWhole"><label for="stratWhole">Wholesale</label></div>
      </div>

      <label>Deal Killers - NEVER send me:</label>
      <div class="checkbox-grid">
        <div class="checkbox-row"><input type="checkbox" id="killHOA"><label for="killHOA">HOA</label></div>
        <div class="checkbox-row"><input type="checkbox" id="killFlood"><label for="killFlood">Flood Zone</label></div>
        <div class="checkbox-row"><input type="checkbox" id="killSeptic"><label for="killSeptic">Septic</label></div>
      </div>
    </form>
  </div>

  <div class="save-status" id="saveStatus">Buy Box Saved</div>

<script>
const form = document.getElementById('buyBoxForm');
const saveStatus = document.getElementById('saveStatus');

// Show broker fields if checked
document.getElementById('roleBroker').addEventListener('change', (e) => {
  document.getElementById('brokerFields').style.display = e.target.checked? 'block' : 'none';
});

// Auto-save all fields
function saveBuyBox() {
  const data = {
    primaryState: document.getElementById('primaryState').value,
    otherStates: Array.from(document.querySelectorAll('[id^=state]:checked')).map(cb => cb.value),
    roles: Array.from(document.querySelectorAll('[id^=role]:checked')).map(cb => cb.id.replace('role','')),
    brokerState: document.getElementById('brokerState').value,
    brokerLicense: document.getElementById('brokerLicense').value,
    budgetMin: document.getElementById('budgetMin').value,
    budgetMax: document.getElementById('budgetMax').value,
    strategies: Array.from(document.querySelectorAll('[id^=strat]:checked')).map(cb => cb.id.replace('strat','')),
    dealKillers: Array.from(document.querySelectorAll('[id^=kill]:checked')).map(cb => cb.id.replace('kill',''))
  };
  localStorage.setItem('vaultforge_buybox', JSON.stringify(data));
  // POST to /api/member/buybox in production
  saveStatus.classList.add('show');
  setTimeout(() => saveStatus.classList.remove('show'), 1500);
}

// Load saved data
const saved = JSON.parse(localStorage.getItem('vaultforge_buybox') || '{}');
if(saved.primaryState) document.getElementById('primaryState').value = saved.primaryState;
if(saved.otherStates) saved.otherStates.forEach(s => document.getElementById('state'+s).checked = true);
if(saved.budgetMin) document.getElementById('budgetMin').value = saved.budgetMin;
if(saved.budgetMax) document.getElementById('budgetMax').value = saved.budgetMax;

// Auto-save on any change
form.addEventListener('input', () => setTimeout(saveBuyBox, 500));
form.addEventListener('change', () => setTimeout(saveBuyBox, 500));
</script>
</body>
</html>
