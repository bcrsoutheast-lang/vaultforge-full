<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VaultForge - $500 Authorization</title>
    <script src="https://js.stripe.com/v3/"></script>
    <style>
        body { background: #0a0e1a; color: #fff; font-family: Arial, sans-serif; max-width: 600px; margin: 50px auto; padding: 20px; }
        .card { background: #1a1f2e; border: 2px solid #00d4ff; border-radius: 12px; padding: 30px; }
        h1 { color: #00d4ff; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #0a0e1a; border: 1px solid #333; color: #fff; border-radius: 6px; }
        #card-element { background: #0a0e1a; padding: 15px; border-radius: 8px; margin: 20px 0; }
        button { background: #00d4ff; color: #000; border: none; padding: 15px 30px; font-size: 18px; font-weight: bold; border-radius: 8px; width: 100%; cursor: pointer; }
        button:disabled { opacity: 0.5; }
        .legal { font-size: 12px; color: #888; margin-top: 20px; }
        #error { color: #ff4444; margin: 10px 0; }
    </style>
</head>
<body>
    <div class="card">
        <h1>$500 BINDING BID AUTHORIZATION</h1>
        <p>Authorizes $500 hold. Released if outbid. Forfeit if you win + fail to close in 72hrs per UCC §2-205.</p>
        
        <form id="payment-form">
            <input type="text" id="name" placeholder="Full Legal Name" required>
            <input type="email" id="email" placeholder="Email" required>
            <div id="card-element"></div>
            <div id="error"></div>
            <button type="submit" id="submit">Authorize $500 Hold</button>
        </form>
        
        <div class="legal">
            ITAR/AS-IS. Chargeback waiver §4.2. Fulton County, GA arbitration. You waive right to revoke for 72hrs.
        </div>
    </div>

<script>
const stripe = Stripe('pk_live_YOUR_PUBLISHABLE_KEY'); // Replace with your pk_live_ key
const elements = stripe.elements();
const card = elements.create('card', { style: { base: { color: '#fff' } } });
card.mount('#card-element');

const form = document.getElementById('payment-form');
form.addEventListener('submit', async (e) => {
  e.preventDefault();
  document.getElementById('submit').disabled = true;
  
  const name = document.getElementById('name').value;
  const email = document.getElementById('email').value;
  
  // 1. Create payment intent on backend
  const res = await fetch('/api/create-hold', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name, email })
  });
  const { clientSecret } = await res.json();
  
  // 2. Confirm card + create hold
  const { error } = await stripe.confirmCardPayment(clientSecret, {
    payment_method: { card, billing_details: { name, email } }
  });
  
  if (error) {
    document.getElementById('error').textContent = error.message;
    document.getElementById('submit').disabled = false;
  } else {
    window.location.href = '/member_profile.html?status=hold_success';
  }
});
</script>
</body>
</html
