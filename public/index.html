<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VaultForge Access</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #000;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      padding: 20px;
    }
    .container {
      max-width: 500px;
      margin: 40px auto;
      background: #0a0a0a;
      border: 1px solid #D4AF37;
      border-radius: 8px;
      padding: 30px;
    }
    img { display: block; margin: 0 auto 20px auto; max-width: 120px; }
    h1 { color: #D4AF37; text-align: center; margin-bottom: 10px; font-size: 28px; }
    p { text-align: center; color: #aaa; margin-bottom: 30px; font-size: 14px; }
    label { color: #D4AF37; font-size: 14px; font-weight: 600; display: block; margin-bottom: 5px; }
    input, select, textarea {
      width: 100%;
      padding: 12px;
      margin-bottom: 16px;
      background: #111;
      border: 1px solid #333;
      border-radius: 4px;
      color: #fff;
      font-size: 16px;
    }
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: #D4AF37;
    }
    button {
      width: 100%;
      padding: 15px;
      background: #D4AF37;
      color: #000;
      border: none;
      border-radius: 4px;
      font-weight: bold;
      font-size: 16px;
      cursor: pointer;
      margin-top: 10px;
    }
    button:hover { background: #e5c158; }
  </style>
</head>
<body>
  <div class="container">
    <img src="IMG_4751.png" alt="VaultForge Logo">
    <h1>VAULTFORGE</h1>
    <p>Elite Protection. Request Access.</p>
    
    <form action="https://formspree.io/f/maqznpra" method="POST">
      <label>Full Name</label>
      <input type="text" name="name" required>
      
      <label>Email</label>
      <input type="email" name="email" required>
      
      <label>Phone</label>
      <input type="tel" name="phone" required>
      
      <label>Business Name</label>
      <input type="text" name="business">
      
      <label>Revenue Range</label>
      <select name="revenue" required>
        <option value="">Select...</option>
        <option>$0 - $100K</option>
        <option>$100K - $500K</option>
        <option>$500K - $1M</option>
        <option>$1M+</option>
      </select>
      
      <label>Primary Threat Concern</label>
      <select name="threat" required>
        <option value="">Select...</option>
        <option>Lawsuits</option>
        <option>IRS/Tax Issues</option>
        <option>Divorce</option>
        <option>Business Partners</option>
        <option>Asset Protection</option>
      </select>
      
      <label>Additional Details</label>
      <textarea name="message" rows="4" placeholder="Tell us about your situation..."></textarea>
      
      <button type="submit">REQUEST ELITE ACCESS</button>
    </form>
  </div>
</body>
</html>
