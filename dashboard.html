<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BOARDROOM PARTNERS // SECURE ACCESS</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Courier New',monospace}
body{background:#0A0A0A;color:#fff;min-height:100vh}
.hidden{display:none!important}
input,select,textarea,button{background:#111;border:1px solid #333;color:#fff;padding:8px;font-size:12px;font-family:inherit}
input:focus,select:focus,textarea:focus{outline:none;border-color:#FFB000}
button{cursor:pointer;text-transform:uppercase;font-weight:700}
button:hover{opacity:0.8}
label{display:block;font-size:11px;margin:8px 0 4px;text-transform:uppercase;color:#888}
.header{padding:20px;border-bottom:1px solid #222;text-align:center}
.header h1{font-size:24px;letter-spacing:2px}
.header p{font-size:10px;color:#666;margin-top:4px}
.login-wrap{max-width:400px;margin:100px auto;padding:30px;border:1px solid #333}
.login-wrap h2{font-size:16px;margin-bottom:20px;text-align:center}
.login-wrap input{width:100%;margin-bottom:12px}
.login-wrap button{width:100%;background:#FFB000;color:#000;border:none;padding:12px}
.error{color:#FF0040;font-size:11px;margin-top:8px;text-align:center}
.nav{background:#111;border-bottom:1px solid #222;display:flex;gap:1px;overflow-x:auto}
.nav button{flex:1;background:#0A0A0A;border:none;padding:16px;font-size:11px;border-bottom:2px solid transparent}
.nav button.active{border-bottom-color:#FFB000;color:#FFB000}
.nav button[data-theme="pain"].active{border-bottom-color:#FFB000;color:#FFB000}
.nav button[data-theme="deal"].active{border-bottom-color:#00FF41;color:#00FF41}
.nav button[data-theme="profile"].active{border-bottom-color:#A000FF;color:#A000FF}
.nav button[data-theme="members"].active{border-bottom-color:#0080FF;color:#0080FF}
.nav button[data-theme="vault"].active{border-bottom-color:#00FFFF;color:#00FFFF}
.nav button[data-theme="logout"]{color:#FF0040}
.container{max-width:1200px;margin:0 auto;padding:20px}
.section{display:none}
.section.active{display:block}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:16px;margin-top:20px}
.card{background:#111;border:1px solid #222;padding:16px}
.card h3{font-size:14px;margin-bottom:12px;color:#FFB000}
.card[data-theme="deal"] h3{color:#00FF41}
.card[data-theme="profile"] h3{color:#A000FF}
.card[data-theme="members"] h3{color:#0080FF}
.card[data-theme="vault"] h3{color:#00FFFF}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.multiselect{position:relative}
.multiselect-btn{width:100%;text-align:left;background:#111;border:1px solid #333;padding:8px;cursor:pointer}
.multiselect-dropdown{position:absolute;top:100%;left:0;right:0;background:#111;border:1px solid #333;max-height:200px;overflow-y:auto;z-index:100;display:none}
.multiselect-dropdown.show{display:block}
.multiselect-dropdown label{display:flex;align-items:center;padding:6px 8px;margin:0;font-size:11px;cursor:pointer}
.multiselect-dropdown label:hover{background:#1a1a1a}
.multiselect-dropdown input[type="checkbox"]{width:auto;margin-right:8px}
.badge{display:inline-block;padding:4px 8px;font-size:10px;border:1px solid;margin:2px}
.badge-home{background:#0080FF;border-color:#0080FF;color:#000}
.badge-operate{background:#333;border-color:#555}
.badge-prof{background:#A000FF;border-color:#A000FF;color:#000}
.badge-deal{background:#00FFFF;border-color:#00FFFF;color:#000}
.btn-primary{background:#FFB000;color:#000;border:none;padding:10px 20px;font-weight:700}
.btn-deal{background:#00FF41;color:#000}
.btn-profile{background:#A000FF;color:#000}
.btn-members{background:#0080FF;color:#000}
.btn-vault{background:#00FFFF;color:#000}
.btn-danger{background:#FF0040;color:#000}
.toggle-group{display:flex;gap:8px;margin:16px 0}
.toggle-group button{flex:1;background:#111;border:1px solid #333}
.toggle-group button.active{background:#FFB000;color:#000;border-color:#FFB000}
.toggle-group[data-theme="deal"] button.active{background:#00FF41;color:#000;border-color:#00FF41}
.room-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;margin-top:20px}
.lead-card{background:#111;border:1px solid #333;padding:12px;font-size:11px}
.lead-card .type{font-size:10px;color:#FFB000;margin-bottom:8px}
.lead-card[data-theme="deal"] .type{color:#00FF41}
.lead-card .addr{font-size:13px;margin-bottom:8px}
.lead-card .meta{color:#888;font-size:10px;margin:4px 0}
.lead-card .profile-mini{border-top:1px solid #222;margin-top:8px;padding-top:8px;font-size:10px}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin:20px 0}
.stat{background:#111;border:1px solid #222;padding:20px;text-align:center}
.stat .num{font-size:32px;color:#FFB000;font-weight:700}
.stat .label{font-size:11px;color:#666;margin-top:8px;text-transform:uppercase}
.modal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.95);z-index:1000;display:none;align-items:center;justify-content:center;padding:20px}
.modal.show{display:flex}
.modal-content{background:#111;border:1px solid #333;max-width:600px;width:100%;max-height:90vh;overflow-y:auto;padding:24px}
.modal h2{font-size:18px;margin-bottom:16px;color:#FFB000}
.modal-actions{display:flex;gap:8px;margin-top:20px}
.modal-actions button{flex:1}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen" class="login-wrap">
  <div class="header">
    <h1>BOARDROOM PARTNERS</h1>
    <p>SECURE ACCESS PORTAL</p>
  </div>
  <h2>LOGIN</h2>
  <input type="text" id="username" placeholder="USERNAME" autocomplete="off">
  <input type="password" id="password" placeholder="PASSWORD" autocomplete="off">
  <button onclick="login()">ACCESS</button>
  <div id="loginError" class="error hidden">ERROR: INVALID CREDENTIALS</div>
</div>

<!-- APP -->
<div id="app" class="hidden">
  <div class="nav">
    <button class="active" onclick="showSection('dashboard')" data-theme="pain">DASHBOARD</button>
    <button onclick="showSection('profile')" data-theme="profile">PROFILE</button>
    <button onclick="showSection('members')" data-theme="members">MEMBERS</button>
    <button onclick="showSection('pain')" data-theme="pain">PAIN</button>
    <button onclick="showSection('deal')" data-theme="deal">DEAL</button>
    <button onclick="showSection('vault')" data-theme="vault">VAULTFORGE</button>
    <button onclick="logout()" data-theme="logout">LOGOUT</button>
  </div>

  <div class="container">
    <!-- DASHBOARD -->
    <div id="dashboard" class="section active">
      <h2 style="color:#FFB000;margin-bottom:20px">DASHBOARD</h2>
      <div class="stats">
        <div class="stat"><div class="num" id="statPain">0</div><div class="label">PAIN Leads</div></div>
        <div class="stat"><div class="num" id="statDeal">0</div><div class="label">DEAL Leads</div></div>
        <div class="stat"><div class="num" id="statMembers">0</div><div class="label">Members</div></div>
        <div class="stat"><div class="num" id="statMatch">0%</div><div class="label">Match Rate</div></div>
      </div>
    </div>

    <!-- PROFILE -->
    <div id="profile" class="section">
      <h2 style="color:#A000FF;margin-bottom:20px">PROFILE // MEMBER CARD</h2>
      <div class="grid">
        <div class="card" data-theme="profile">
          <h3>BASIC INFO</h3>
          <label>Company Name *</label><input type="text" id="pCompany">
          <label>Your Name *</label><input type="text" id="pName">
          <label>Title/Role *</label><input type="text" id="pTitle">
          <label>Phone *</label><input type="text" id="pPhone">
          <label>Email *</label><input type="text" id="pEmail">
          <label>Bio / About</label><textarea id="pBio" rows="3"></textarea>
        </div>
        <div class="card" data-theme="profile">
          <h3>LOCATION</h3>
          <label>Home State * [FROM]</label>
          <select id="pHomeState"></
