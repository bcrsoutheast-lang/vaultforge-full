<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DEAL // TERMINAL</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
    @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&display=swap');
    
    :root {
        --bg: #0A0A0A;
        --panel: #0F0F0F;
        --panel-lit: #141414;
        --green: #00FF41;
        --green-dim: #00C832;
        --red: #FF0040;
        --red-dim: #C80032;
        --yellow: #FFD700;
        --text: #00FF41;
        --text-dim: #00A82D;
        --border: #1F1F1F;
        --border-lit: #00FF41;
    }

    * {
        font-family: 'IBM Plex Mono', monospace;
        text-transform: uppercase;
        border-radius: 0 !important;
    }

    body {
        background: var(--bg);
        color: var(--text);
        letter-spacing: 0.03em;
        font-size: 12px;
        line-height: 1.4;
    }

    .terminal-glow {
        text-shadow: 0 0 5px var(--green), 0 0 10px var(--green);
    }

    .terminal-glow-red {
        text-shadow: 0 0 5px var(--red), 0 0 10px var(--red);
    }

    .panel {
        background: var(--panel);
        border: 1px solid var(--border);
        box-shadow: inset 0 1px 0 rgba(0,255,65,0.1);
    }

    .panel-lit {
        background: var(--panel-lit);
        border: 1px solid var(--green-dim);
    }

    .btn {
        background: var(--panel);
        border: 1px solid var(--green-dim);
        color: var(--green);
        padding: 8px 16px;
        font-weight: 600;
        transition: all 0.1s;
        cursor: pointer;
        user-select: none;
    }

    .btn:hover {
        background: var(--green-dim);
        color: var(--bg);
        box-shadow: 0 0 10px var(--green-dim);
    }

    .btn:active {
        transform: translateY(1px);
    }

    .btn-red {
        border-color: var(--red-dim);
        color: var(--red);
    }

    .btn-red:hover {
        background: var(--red-dim);
        color: var(--bg);
        box-shadow: 0 0 10px var(--red-dim);
    }

    .btn-active {
        background: var(--green);
        color: var(--bg);
        border-color: var(--green);
        box-shadow: 0 0 10px var(--green);
    }

    input, select, textarea {
        background: var(--bg);
        border: 1px solid var(--border);
        color: var(--green);
        padding: 6px 8px;
        font-size: 12px;
        width: 100%;
        outline: none;
    }

    input:focus, select:focus, textarea:focus {
        border-color: var(--green);
        box-shadow: 0 0 8px rgba(0,255,65,0.3);
    }

    input.error, select.error, textarea.error {
        border-color: var(--red);
        animation: blink 0.5s 2;
    }

    label {
        color: var(--text-dim);
        font-size: 11px;
        margin-bottom: 4px;
        display: block;
    }

    label.required::after {
        content: ' *';
        color: var(--red);
    }

    .field-group {
        margin-bottom: 12px;
    }

    @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.3; }
    }

    .blink {
        animation: blink 1s infinite;
    }

    .status-msg {
        padding: 8px;
        margin: 12px 0;
        border: 1px solid var(--red-dim);
        background: rgba(255,0,64,0.1);
        color: var(--red);
        display: none;
    }

    .status-msg.show {
        display: block;
        animation: blink 0.5s 2;
    }

    .status-msg.success {
        border-color: var(--green-dim);
        background: rgba(0,255,65,0.1);
        color: var(--green);
    }

    .deal-card {
        background: var(--panel);
        border: 1px solid var(--border);
        padding: 12px;
        cursor: pointer;
        transition: all 0.1s;
        margin-bottom: 8px;
    }

    .deal-card:hover {
        border-color: var(--green);
        background: var(--panel-lit);
        box-shadow: 0 0 12px rgba(0,255,65,0.2);
    }

    .photo-slot {
        width: 80px;
        height: 80px;
        border: 1px solid var(--border);
        background: var(--bg);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 10px;
        cursor: pointer;
        position: relative;
        overflow: hidden;
    }

    .photo-slot img {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }

    .photo-slot:hover {
        border-color: var(--green);
    }

    .photo-slot .remove {
        position: absolute;
        top: 0;
        right: 0;
        background: var(--red);
        color: var(--bg);
        width: 16px;
        height: 16px;
        display: none;
        align-items: center;
        justify-content: center;
        font-size: 10px;
        cursor: pointer;
    }

    .photo-slot:hover .remove {
        display: flex;
    }

    .modal {
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.95);
        z-index: 100;
        display: none;
        align-items: center;
        justify-content: center;
        padding: 20px;
    }

    .modal.show {
        display: flex;
    }

    .divider {
        height: 1px;
        background: var(--border);
        margin: 16px 0;
    }

    .metric {
        display: flex;
        justify-content: space-between;
        padding: 6px 0;
        border-bottom: 1px solid var(--border);
    }

    .metric:last-child {
        border-bottom: none;
    }

    .ticker {
        overflow: hidden;
        white-space: nowrap;
        border-top: 1px solid var(--green-dim);
        border-bottom: 1px solid var(--green-dim);
        padding: 6px 0;
        margin: 12px 0;
    }

    .ticker-content {
        display: inline-block;
        animation: scroll 20s linear infinite;
    }

    @keyframes scroll {
        0% { transform: translateX(100%); }
        100% { transform: translateX(-100%); }
    }

    select {
        appearance: none;
        background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L5 5L9 1' stroke='%2300FF41' stroke-width='1.5'/%3E%3C/svg%3E");
        background-repeat: no-repeat;
        background-position: right 8px center;
        padding-right: 24px;
    }

    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button {
        -webkit-appearance: none;
        margin: 0;
    }

    ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
    }

    ::-webkit-scrollbar-track {
        background: var(--bg);
    }

    ::-webkit-scrollbar-thumb {
        background: var(--green-dim);
    }

    ::-webkit-scrollbar-thumb:hover {
        background: var(--green);
    }

    .hidden { display: none !important; }
</style>
</head>
<body>
<div id="app" class="min-h-screen p-3 md:p-4">
    <div class="max-w-7xl mx-auto">
        <!-- HEADER -->
        <div class="panel p-3 mb-4 flex justify-between items-center">
            <div class="flex items-center gap-4">
                <div class="text-xl terminal-glow font-bold">DEAL // TERMINAL</div>
                <div class="text-xs text-[var(--text-dim)] hidden md:block">NEW DEAL SUBMISSION v2.4.1</div>
            </div>
            <button id="closeBtn" class="btn btn-red">CLOSE [X]</button>
        </div>

        <!-- DEAL INTAKE FORM -->
        <div id="intakeForm" class="panel p-4 mb-4">
            <div class="mb-4">
                <div class="text-sm terminal-glow mb-3">// NEW DEAL SUBMISSION</div>
                <div class="flex gap-2 flex-wrap">
                    <button class="btn btn-active type-toggle" data-type="RESIDENTIAL">RESIDENTIAL</button>
                    <button class="btn type-toggle" data-type="COMMERCIAL">COMMERCIAL</button>
                    <button class="btn type-toggle" data-type="LAND">LAND</button>
                </div>
            </div>

            <div class="divider"></div>

            <!-- SHARED FIELDS -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-3 mb-4">
                <div class="field-group md:col-span-3">
                    <label class="required">PROPERTY ADDRESS</label>
                    <input type="text" id="address" placeholder="123 MAIN ST">
                </div>
                <div class="field-group">
                    <label class="required">CITY</label>
                    <input type="text" id="city" placeholder="LOS ANGELES">
                </div>
                <div class="field-group">
                    <label class="required">STATE</label>
                    <select id="state">
                        <option value="">SELECT</option>
                    </select>
                </div>
                <div class="field-group">
                    <label class="required">ZIP</label>
                    <input type="text" id="zip" placeholder="90001" maxlength="5">
                </div>
                <div class="field-group">
                    <label class="required">OWNER NAME</label>
                    <input type="text" id="ownerName" placeholder="JOHN DOE">
                </div>
                <div class="field-group">
                    <label class="required">PHONE</label>
                    <input type="tel" id="phone" placeholder="555-123-4567">
                </div>
                <div class="field-group">
                    <label>EMAIL</label>
                    <input type="email" id="email" placeholder="OWNER@EMAIL.COM">
                </div>
                <div class="field-group">
                    <label class="required">MOTIVATION</label>
                    <select id="motivation">
                        <option value="">SELECT</option>
                        <option>DIVORCE</option>
                        <option>DEATH</option>
                        <option>FORECLOSURE</option>
                        <option>JOB LOSS</option>
                        <option>RELOCATION</option>
                        <option>TAX LIEN</option>
                        <option>TIRED LANDLORD</option>
                        <option>OTHER</option>
                    </select>
                </div>
                <div class="field-group">
                    <label class="required">CONDITION</label>
                    <select id="condition">
                        <option value="">SELECT</option>
                        <option>EXCELLENT</option>
                        <option>GOOD</option>
                        <option>FAIR</option>
                        <option>POOR</option>
                        <option>NEEDS FULL REHAB</option>
                    </select>
                </div>
                <div class="field-group">
                    <label class="required">OCCUPANCY</label>
                    <select id="occupancy">
                        <option value="">SELECT</option>
                        <option>OWNER OCCUPIED</option>
                        <option>TENANT OCCUPIED</option>
                        <option>VACANT</option>
                    </select>
                </div>
            </div>

            <!-- TYPE SPECIFIC FIELDS -->
            <div class="divider"></div>
            
            <!-- RESIDENTIAL FIELDS -->
            <div id="residentialFields" class="grid grid-cols-1 md:grid-cols-4 gap-3 mb-4">
                <div class="field-group">
                    <label class="required">BEDS</label>
                    <select id="beds">
                        <option value="">SELECT</option>
                        <option>1</option><option>2</option><option>3</option><option>4</option>
                        <option>5</option><option>6</option><option>7</option><option>8</option>
                        <option>9</option><option>10</option>
                    </select>
                </div>
                <div class="field-group">
                    <label class="required">BATHS</label>
                    <select id="baths">
                        <option value="">SELECT</option>
                        <option>1</option><option>1.5</option><option>2</option><option>2.5</option>
                        <option>3</option><option>3.5</option><option>4</option><option>4.5</option>
                        <option>5</option><option>5.5</option><option>6</option><option>6.5</option>
                        <option>7</option><option>7.5</option><option>8</option><option>8.5</option>
                        <option>9</option><option>9.5</option><option>10</option>
                    </select>
                </div>
                <div class="field-group">
                    <label class="required">SQFT</label>
                    <input type="number" id="sqft" placeholder="1500">
                </div>
                <div class="field-group">
                    <label>YEAR BUILT</label>
                    <input type="number" id="yearBuilt" placeholder="1995">
                </div>
            </div>

            <!-- COMMERCIAL FIELDS -->
            <div id="commercialFields" class="hidden grid grid-cols-1 md:grid-cols-5 gap-3 mb-4">
                <div class="field-group">
                    <label class="required">UNITS</label>
                    <input type="number" id="units" placeholder="4">
                </div>
                <div class="field-group">
                    <label class="required">SQFT</label>
                    <input type="number" id="commercialSqft" placeholder="5000">
                </div>
                <div class="field-group">
                    <label>ZONING</label>
                    <input type="text" id="commercialZoning" placeholder="C-1">
                </div>
                <div class="field-group">
                    <label>CAP RATE</label>
                    <input type="number" id="capRate" placeholder="6.5" step="0.1">
                </div>
                <div class="field-group">
                    <label>NOI</label>
                    <input type="number" id="noi" placeholder="45000">
                </div>
            </div>

            <!-- LAND FIELDS -->
            <div id="landFields" class="hidden grid grid-cols-1 md:grid-cols-4 gap-3 mb-4">
                <div class="field-group">
                    <label class="required">ACRES</label>
                    <input type="number" id="acres" placeholder="2.5" step="0.1">
                </div>
                <div class="field-group">
                    <label>ZONING</label>
                    <input type="text" id="landZoning" placeholder="R-1">
                </div>
                <div class="field-group">
                    <label>UTILITIES</label>
                    <select id="utilities">
                        <option value="">SELECT</option>
                        <option>WATER/SEWER AVAILABLE</option>
                        <option>WELL/SEPTIC</option>
                        <option>NONE</option>
                    </select>
                </div>
                <div class="field-group">
                    <label>ROAD ACCESS</label>
                    <select id="roadAccess">
                        <option value="">SELECT</option>
                        <option>PAVED ROAD</option>
                        <option>DIRT ROAD</option>
                        <option>LANDLOCKED</option>
                    </select>
                </div>
            </div>

            <div class="divider"></div>

            <!-- FINANCIAL & NOTES -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-3 mb-4">
                <div class="field-group">
                    <label class="required">ASKING PRICE</label>
                    <input type="number" id="askingPrice" placeholder="250000">
                </div>
                <div class="field-group">
                    <label>EST ARV</label>
                    <input type="number" id="estArv" placeholder="320000">
                </div>
                <div class="field-group">
                    <label>EST REPAIRS</label>
                    <input type="number" id="estRepairs" placeholder="25000">
                </div>
                <div class="field-group md:col-span-3">
                    <label>NOTES</label>
                    <textarea id="notes" rows="3" placeholder="ADDITIONAL DEAL INFO..."></textarea>
                </div>
            </div>

            <!-- PHOTOS -->
            <div class="field-group mb-4">
                <label class="required">PHOTOS <span id="photoCount">[0/10]</span></label>
                <div class="flex flex-wrap gap-2 mb-2">
                    <div class="photo-slot" id="uploadTrigger">[+ UPLOAD]</div>
                    <div id="photoSlots" class="flex flex-wrap gap-2"></div>
                </div>
                <input type="file" id="photoInput" accept="image/*" multiple class="hidden">
            </div>

            <div id="statusMsg" class="status-msg"></div>

            <div class="flex gap-2">
                <button id="cancelBtn" class="btn btn-red">CANCEL</button>
                <button id="submitBtn" class="btn btn-active">SUBMIT DEAL</button>
            </div>
        </div>

        <!-- DEAL ROOM DASHBOARD -->
        <div class="panel p-4">
            <div class="mb-4">
                <div class="text-sm terminal-glow mb-3">// DEAL ROOM</div>
                <div class="ticker">
                    <div class="ticker-content">
                        MARKET ACTIVE // AVG SPREAD: $45,250 // HOT ZIP: 90210 // FORECLOSURES UP 12% // CASH BUYERS: 847 ONLINE // 
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div>
                    <div class="text-xs text-[var(--text-dim)] mb-2">ACTIVE DEALS [<span id="activeCount">0</span>]</div>
                    <div id="activeDeals" class="space-y-2"></div>
                </div>
                <div>
                    <div class="text-xs text-[var(--text-dim)] mb-2">DEAL SAVED [<span id="savedCount">0</span>]</div>
                    <div id="savedDeals" class="space-y-2"></div>
                </div>
                <div>
                    <div class="text-xs text-[var(--text-dim)] mb-2">DEAL ARCHIVED [<span id="archivedCount">0</span>]</div>
                    <div id="archivedDeals" class="space-y-2"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- DETAIL MODAL -->
<div id="detailModal" class="modal">
    <div class="panel max-w-4xl w-full max-h-[90vh] overflow-y-auto p-4">
        <div class="flex justify-between items-center mb-4">
            <div class="text-sm terminal-glow">// DEAL DETAIL</div>
            <button id="closeModalBtn" class="btn btn-red">BACK [X]</button>
        </div>
        <div id="detailContent"></div>
        <div class="flex gap-2 mt-4 flex-wrap">
            <button id="saveBtn" class="btn">SAVE</button>
            <button id="archiveBtn" class="btn">ARCHIVE</button>
            <button id="deleteBtn" class="btn btn-red">DELETE</button>
            <button id="messageBtn" class="btn">MESSAGE OWNER</button>
        </div>
    </div>
</div>

<script>
    // STATE
    let currentType = 'RESIDENTIAL';
    let deals = [];
    let photos = [];
    let currentDealId = null;
    let dealIdCounter = 1;

    const US_STATES = [
        'AL','AK','AZ','AR','CA','CO','CT','DE','FL','GA','HI','ID','IL','IN','IA','KS','KY','LA','ME','MD','MA','MI','MN','MS','MO','MT','NE','NV','NH','NJ','NM','NY','NC','ND','OH','OK','OR','PA','RI','SC','SD','TN','TX','UT','VT','VA','WA','WV','WI','WY'
    ];

    // DOM
    const $ = (id) => document.getElementById(id);
    const $$ = (sel) => document.querySelectorAll(sel);

    // INIT
    function init() {
        // Populate states
        const stateSelect = $('state');
        US_STATES.forEach(s => {
            const opt = document.createElement('option');
            opt.value = s;
            opt.textContent = s;
            stateSelect.appendChild(opt);
        });

        // Event listeners
        $$('.type-toggle').forEach(btn => {
            btn.addEventListener('click', () => switchType(btn.dataset.type));
        });

        $('uploadTrigger').addEventListener('click', () => $('photoInput').click());
        $('photoInput').addEventListener('change', handlePhotoUpload);
        $('submitBtn').addEventListener('click', submitDeal);
        $('cancelBtn').addEventListener('click', resetForm);
        $('closeBtn').addEventListener('click', () => {
            if (confirm('CLOSE TERMINAL?')) window.close();
        });
        $('closeModalBtn').addEventListener('click', closeModal);
        $('saveBtn').addEventListener('click', () => updateDealStatus('SAVED'));
        $('archiveBtn').addEventListener('click', () => updateDealStatus('ARCHIVED'));
        $('deleteBtn').addEventListener('click', deleteDeal);
        $('messageBtn').addEventListener('click', () => {
            showStatus('MESSAGE SENT TO OWNER', true);
        });

        renderDeals();
    }

    function switchType(type) {
        currentType = type;
        $$('.type-toggle').forEach(btn => {
            btn.classList.toggle('btn-active', btn.dataset.type === type);
        });

        $('residentialFields').classList.toggle('hidden', type !== 'RESIDENTIAL');
        $('commercialFields').classList.toggle('hidden', type !== 'COMMERCIAL');
        $('landFields').classList.toggle('hidden', type !== 'LAND');
    }

    function handlePhotoUpload(e) {
        const files = Array.from(e.target.files);
        const remaining = 10 - photos.length;
        const toAdd = files.slice(0, remaining);

        toAdd.forEach(file => {
            const reader = new FileReader();
            reader.onload = (ev) => {
                photos.push(ev.target.result);
                renderPhotos();
            };
            reader.readAsDataURL(file);
        });

        e.target.value = '';
    }

    function renderPhotos() {
        const container = $('photoSlots');
        container.innerHTML = '';
        photos.forEach((photo, idx) => {
            const slot = document.createElement('div');
            slot.className = 'photo-slot';
            slot.innerHTML = `
                <img src="${photo}">
                <div class="remove" onclick="removePhoto(${idx})">X</div>
            `;
            container.appendChild(slot);
        });
        $('photoCount').textContent = `[${photos.length}/10]`;
    }

    window.removePhoto = function(idx) {
        photos.splice(idx, 1);
        renderPhotos();
    }

    function validate() {
        const errors = [];
        const required = ['address', 'city', 'state', 'zip', 'ownerName', 'phone', 'motivation', 'condition', 'occupancy', 'askingPrice'];
        
        if (currentType === 'RESIDENTIAL') {
            required.push('beds', 'baths', 'sqft');
        } else if (currentType === 'COMMERCIAL') {
            required.push('units', 'commercialSqft');
        } else if (currentType === 'LAND') {
            required.push('acres');
        }

        required.forEach(id => {
            const el = $(id);
            if (!el.value.trim()) {
                errors.push(id);
                el.classList.add('error');
                setTimeout(() => el.classList.remove('error'), 2000);
            }
        });

        if (photos.length === 0) {
            errors.push('photos');
        }

        if (errors.length > 0) {
            showStatus('INCOMPLETE: FILL REQUIRED FIELDS + UPLOAD MIN 1 PHOTO', false);
            return false;
        }

        return true;
    }

    function showStatus(msg, success = false) {
        const statusEl = $('statusMsg');
        statusEl.textContent = msg;
        statusEl.className = 'status-msg show' + (success ? ' success' : '');
        setTimeout(() => statusEl.classList.remove('show'), 3000);
    }

    function submitDeal() {
        if (!validate()) return;

        $('submitBtn').textContent = 'ANALYZING...';
        $('submitBtn').disabled = true;

        setTimeout(() => {
            const deal = {
                id: dealIdCounter++,
                type: currentType,
                address: $('address').value.toUpperCase(),
                city: $('city').value.toUpperCase(),
                state: $('state').value,
                zip: $('zip').value,
                ownerName: $('ownerName').value.toUpperCase(),
                phone: $('phone').value,
                email: $('email').value,
                motivation: $('motivation').value,
                condition: $('condition').value,
                occupancy: $('occupancy').value,
                askingPrice: Number($('askingPrice').value),
                estArv: Number($('estArv').value) || 0,
                estRepairs: Number($('estRepairs').value) || 0,
                notes: $('notes').value.toUpperCase(),
                photos: [...photos],
                status: 'ACTIVE',
                timestamp: Date.now()
            };

            // Add type specific fields
            if (currentType === 'RESIDENTIAL') {
                deal.beds = $('beds').value;
                deal.baths = $('baths').value;
                deal.sqft = Number($('sqft').value);
                deal.yearBuilt = Number($('yearBuilt').value) || 0;
            } else if (currentType === 'COMMERCIAL') {
                deal.units = Number($('units').value);
                deal.commercialSqft = Number($('commercialSqft').value);
                deal.commercialZoning = $('commercialZoning').value.toUpperCase();
                deal.capRate = Number($('capRate').value) || 0;
                deal.noi = Number($('noi').value) || 0;
            } else if (currentType === 'LAND') {
                deal.acres = Number($('acres').value);
                deal.landZoning = $('landZoning').value.toUpperCase();
                deal.utilities = $('utilities').value;
                deal.roadAccess = $('roadAccess').value;
            }

            deals.unshift(deal);
            renderDeals();
            resetForm();
            showStatus('SENT', true);
            $('submitBtn').textContent = 'SUBMIT DEAL';
            $('submitBtn').disabled = false;
        }, 2000);
    }

    function resetForm() {
        $$('input, select, textarea').forEach(el => el.value = '');
        photos = [];
        renderPhotos();
        $('residentialFields').classList.remove('hidden');
        $('commercialFields').classList.add('hidden');
        $('landFields').classList.add('hidden');
        switchType('RESIDENTIAL');
    }

    function generateAI(bps, dqi) {
        const buyers = ['INSTABUYER', 'QUICKCLOSE', 'CASHPROP', 'FLIPCORP', 'RENTERLLC'];
        return {
            BPS: Math.floor(Math.random() * 40) + 60,
            DQI: Math.floor(Math.random() * 30) + 70,
            ACI: Math.floor(Math.random() * 20) + 80,
            DOM: Math.floor(Math.random() * 30) + 5,
            SPREAD: Math.floor(Math.random() * 50000) + 20000,
            MATCH: buyers[Math.floor(Math.random() * buyers.length)]
        };
    }

    function renderDeals() {
        const containers = {
            ACTIVE: $('activeDeals'),
            SAVED: $('savedDeals'),
            ARCHIVED: $('archivedDeals')
        };

        Object.values(containers).forEach(c => c.innerHTML = '');

        deals.forEach(deal => {
            const ai = generateAI();
            const card = document.createElement('div');
            card.className = 'deal-card';
            
            let typeInfo = '';
            if (deal.type === 'RESIDENTIAL') {
                typeInfo = `${deal.beds}BD/${deal.baths}BA | ${deal.sqft?.toLocaleString()} SQFT`;
            } else if (deal.type === 'COMMERCIAL') {
                typeInfo = `${deal.units} UNITS | ${deal.commercialSqft?.toLocaleString()} SQFT`;
            } else if (deal.type === 'LAND') {
                typeInfo = `${deal.acres} AC | ${deal.landZoning || 'UNZONED'}`;
            }

            card.innerHTML = `
                <div class="flex justify-between items-start mb-2">
                    <div class="text-xs terminal-glow">${deal.type}</div>
                    <div class="text-xs text-[var(--text-dim)]">ID:${deal.id}</div>
                </div>
                <div class="text-xs mb-1">${deal.address}</div>
                <div class="text-xs text-[var(--text-dim)] mb-2">${deal.city}, ${deal.state} ${deal.zip}</div>
                <div class="text-xs mb-2">${typeInfo}</div>
                <div class="flex justify-between text-xs">
                    <span>ASK: $${deal.askingPrice.toLocaleString()}</span>
                    <span class="text-[var(--green)]">SPR: $${ai.SPREAD.toLocaleString()}</span>
                </div>
                <div class="flex gap-2 mt-2 text-xs">
                    <span>DQI:${ai.DQI}</span>
                    <span>BPS:${ai.BPS}</span>
                    <span>DOM:${ai.DOM}</span>
                </div>
            `;
            card.onclick = () => showDetail(deal.id);
            containers[deal.status].appendChild(card);
        });

        $('activeCount').textContent = deals.filter(d => d.status === 'ACTIVE').length;
        $('savedCount').textContent = deals.filter(d => d.status === 'SAVED').length;
        $('archivedCount').textContent = deals.filter(d => d.status === 'ARCHIVED').length;
    }

    function showDetail(id) {
        currentDealId = id;
        const deal = deals.find(d => d.id === id);
        if (!deal) return;

        const ai = generateAI();
        const content = $('detailContent');
        
        let typeSpecific = '';
        if (deal.type === 'RESIDENTIAL') {
            typeSpecific = `
                <div class="metric"><span>BEDS</span><span>${deal.beds}</span></div>
                <div class="metric"><span>BATHS</span><span>${deal.baths}</span></div>
                <div class="metric"><span>SQFT</span><span>${deal.sqft?.toLocaleString()}</span></div>
                <div class="metric"><span>YEAR BUILT</span><span>${deal.yearBuilt || 'N/A'}</span></div>
            `;
        } else if (deal.type === 'COMMERCIAL') {
            typeSpecific = `
                <div class="metric"><span>UNITS</span><span>${deal.units}</span></div>
                <div class="metric"><span>SQFT</span><span>${deal.commercialSqft?.toLocaleString()}</span></div>
                <div class="metric"><span>ZONING</span><span>${deal.commercialZoning || 'N/A'}</span></div>
                <div class="metric"><span>CAP RATE</span><span>${deal.capRate}%</span></div>
                <div class="metric"><span>NOI</span><span>$${deal.noi?.toLocaleString()}</span></div>
            `;
        } else if (deal.type === 'LAND') {
            typeSpecific = `
                <div class="metric"><span>ACRES</span><span>${deal.acres}</span></div>
                <div class="metric"><span>ZONING</span><span>${deal.landZoning || 'N/A'}</span></div>
                <div class="metric"><span>UTILITIES</span><span>${deal.utilities || 'N/A'}</span></div>
                <div class="metric"><span>ROAD ACCESS</span><span>${deal.roadAccess || 'N/A'}</span></div>
            `;
        }

        content.innerHTML = `
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                <div class="panel-lit p-3">
                    <div class="text-xs terminal-glow mb-2">// PROPERTY INFO</div>
                    <div class="metric"><span>TYPE</span><span>${deal.type}</span></div>
                    <div class="metric"><span>ADDRESS</span><span>${deal.address}</span></div>
                    <div class="metric"><span>CITY/STATE/ZIP</span><span>${deal.city}, ${deal.state} ${deal.zip}</span></div>
                    ${typeSpecific}
                    <div class="metric"><span>CONDITION</span><span>${deal.condition}</span></div>
                    <div class="metric"><span>OCCUPANCY</span><span>${deal.occupancy}</span></div>
                </div>
                <div class="panel-lit p-3">
                    <div class="text-xs terminal-glow mb-2">// AI ANALYZED INFO</div>
                    <div class="metric"><span>BPS</span><span class="terminal-glow">${ai.BPS}</span></div>
                    <div class="metric"><span>DQI</span><span class="terminal-glow">${ai.DQI}</span></div>
                    <div class="metric"><span>ACI</span><span class="terminal-glow">${ai.ACI}</span></div>
                    <div class="metric"><span>DOM</span><span>${ai.DOM}</span></div>
                    <div class="metric"><span>SPREAD</span><span class="terminal-glow">$${ai.SPREAD.toLocaleString()}</span></div>
                    <div class="metric"><span>BEST MATCH</span><span>${ai.MATCH}</span></div>
                </div>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                <div class="panel-lit p-3">
                    <div class="text-xs terminal-glow mb-2">// OWNER INFO</div>
                    <div class="metric"><span>NAME</span><span>${deal.ownerName}</span></div>
                    <div class="metric"><span>PHONE</span><span>${deal.phone}</span></div>
                    <div class="metric"><span>EMAIL</span><span>${deal.email || 'N/A'}</span></div>
                    <div class="metric"><span>MOTIVATION</span><span>${deal.motivation}</span></div>
                </div>
                <div class="panel-lit p-3">
                    <div class="text-xs terminal-glow mb-2">// FINANCIALS</div>
                    <div class="metric"><span>ASKING PRICE</span><span>$${deal.askingPrice.toLocaleString()}</span></div>
                    <div class="metric"><span>EST ARV</span><span>$${deal.estArv.toLocaleString()}</span></div>
                    <div class="metric"><span>EST REPAIRS</span><span>$${deal.estRepairs.toLocaleString()}</span></div>
                    <div class="metric"><span>STATUS</span><span>${deal.status}</span></div>
                </div>
            ${deal.notes ? `<div class="panel-lit p-3 mb-4"><div class="text-xs terminal-glow mb-2">// NOTES</div><div class="text-xs">${deal.notes}</div></div>` : ''}
            <div class="panel-lit p-3">
                <div class="text-xs terminal-glow mb-2">// PHOTOS [${deal.photos.length}]</div>
                <div class="flex flex-wrap gap-2">
                    ${deal.photos.map(p => `<div class="photo-slot"><img src="${p}"></div>`).join('')}
                </div>
            </div>
        `;

        $('detailModal').classList.add('show');
    }

    function closeModal() {
        $('detailModal').classList.remove('show');
        currentDealId = null;
    }

    function updateDealStatus(status) {
        if (!currentDealId) return;
        const deal = deals.find(d => d.id === currentDealId);
        if (deal) {
            deal.status = status;
            renderDeals();
            showStatus(`DEAL ${status}`, true);
            closeModal();
        }
    }

    function deleteDeal() {
        if (!currentDealId) return;
        if (confirm('DELETE DEAL? THIS CANNOT BE UNDONE')) {
            deals = deals.filter(d => d.id !== currentDealId);
            renderDeals();
            showStatus('DEAL DELETED', true);
            closeModal();
        }
    }

    // START
    init();
</script>
<script>(function(){document.addEventListener("click",function(e){var a=e.target.closest("[data-product-id]");if(!a)return;e.preventDefault();var pid=a.getAttribute("data-product-id");if(pid)parent.postMessage({type:"ecto-artifact-link-click",productId:pid},"*")})})();</script>
</body>
</html>
