<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PAIN ROOM DASHBOARD</title>
<style>
:root {
  --bg: #000000;
  --panel: #0a0a0a;
  --border: #333333;
  --amber: #FFB000;
  --white: #E6E6E6;
  --red: #FF3B30;
  --green: #34C759;
  --gray: #888888;
  --font: 'Courier New', Courier, monospace;
}
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}
body {
  background: var(--bg);
  color: var(--white);
  font-family: var(--font);
  font-size: 12px;
  line-height: 1.4;
  text-transform: uppercase;
  letter-spacing: 0.02em;
}
.header {
  border-bottom: 1px solid var(--border);
  padding: 8px 12px;
  background: var(--panel);
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: sticky;
  top: 0;
  z-index: 100;
}
.header-title {
  color: var(--amber);
  font-weight: 700;
  font-size: 14px;
}
.header-stats {
  color: var(--gray);
  font-size: 11px;
}
.container {
  padding: 16px 12px;
  max-width: 1400px;
  margin: 0 auto;
}
.view {
  display: none;
}
.view.active {
  display: block;
}
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 1px;
  background: var(--border);
  border: 1px solid var(--border);
}
.card {
  background: var(--panel);
  padding: 12px;
  cursor: pointer;
  transition: background 0.15s;
  border: 1px solid transparent;
}
.card:hover {
  background: #111111;
  border-color: var(--amber);
}
.card-title {
  color: var(--amber);
  font-weight: 700;
  margin-bottom: 8px;
  font-size: 13px;
}
.card-count {
  color: var(--white);
  font-size: 24px;
  font-weight: 700;
}
.card-desc {
  color: var(--gray);
  font-size: 10px;
  margin-top: 4px;
}
.list-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
}
.list-title {
  color: var(--amber);
  font-size: 16px;
  font-weight: 700;
}
.btn {
  background: var(--panel);
  color: var(--amber);
  border: 1px solid var(--border);
  padding: 6px 12px;
  font-family: var(--font);
  font-size: 11px;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.15s;
  font-weight: 700;
}
.btn:hover {
  background: var(--amber);
  color: var(--bg);
  border-color: var(--amber);
}
.btn-red {
  color: var(--red);
  border-color: var(--red);
}
.btn-red:hover {
  background: var(--red);
  color: var(--bg);
}
.btn-green {
  color: var(--green);
  border-color: var(--green);
}
.btn-green:hover {
  background: var(--green);
  color: var(--bg);
}
.submission-row {
  display: grid;
  grid-template-columns: 80px 1fr auto;
  gap: 12px;
  padding: 8px;
  border: 1px solid var(--border);
  margin-bottom: 1px;
  background: var(--panel);
  cursor: pointer;
  align-items: center;
}
.submission-row:hover {
  background: #111111;
  border-color: var(--amber);
}
.thumb {
  width: 80px;
  height: 60px;
  background: #1a1a1a;
  border: 1px solid var(--border);
  object-fit: cover;
}
.sub-data {
  display: grid;
  grid-template-columns: repeat(6, auto);
  gap: 16px;
  align-items: center;
}
.data-point {
  display: flex;
  flex-direction: column;
}
.data-label {
  color: var(--gray);
  font-size: 9px;
}
.data-value {
  color: var(--white);
  font-size: 12px;
  font-weight: 700;
}
.data-value.amber {
  color: var(--amber);
}
.detail-grid {
  display: grid;
  grid-template-columns: 1fr 320px;
  gap: 1px;
  background: var(--border);
  border: 1px solid var(--border);
}
.detail-main, .detail-side {
  background: var(--panel);
  padding: 12px;
}
.project-header {
  color: var(--amber);
  font-size: 18px;
  font-weight: 700;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 12px;
}
.gallery {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
  gap: 4px;
  margin-bottom: 16px;
}
.gallery-img {
  width: 100%;
  height: 90px;
  object-fit: cover;
  border: 1px solid var(--border);
  cursor: pointer;
}
.gallery-img:hover {
  border-color: var(--amber);
}
.section {
  margin-bottom: 16px;
  border-top: 1px solid var(--border);
  padding-top: 12px;
}
.section-title {
  color: var(--amber);
  font-size: 11px;
  font-weight: 700;
  margin-bottom: 8px;
}
.data-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 8px;
}
.form-row {
  display: grid;
  grid-template-columns: 120px 1fr;
  gap: 8px;
  padding: 4px 0;
  border-bottom: 1px dotted #222;
}
.form-label {
  color: var(--gray);
}
.form-value {
  color: var(--white);
  font-weight: 700;
}
.ai-box {
  background: #0d0d0d;
  border: 1px solid var(--border);
  padding: 8px;
  font-size: 11px;
  line-height: 1.5;
}
.actions {
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.actions .btn {
  width: 100%;
  text-align: center;
}
.empty {
  padding: 40px 12px;
  text-align: center;
  color: var(--gray);
  border: 1px solid var(--border);
  background: var(--panel);
}
.metric {
  padding: 8px;
  border: 1px solid var(--border);
  background: var(--bg);
}
.metric-label {
  color: var(--gray);
  font-size: 9px;
}
.metric-value {
  color: var(--amber);
  font-size: 16px;
  font-weight: 700;
}
@media (max-width: 768px) {
  .detail-grid {
    grid-template-columns: 1fr;
  }
  .sub-data {
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }
  .submission-row {
    grid-template-columns: 60px 1fr;
  }
  .sub-data .data-point:nth-child(n+4) {
    display: none;
  }
  .thumb {
    width: 60px;
    height: 45px;
  }
}
</style>
</head>
<body>
<div class="header">
  <div class="header-title">PAIN ROOM DASHBOARD</div>
  <div class="header-stats" id="headerStats">SESSION ACTIVE | <span id="time"></span></div>
</div>

<div class="container">
  <!-- DASHBOARD VIEW -->
  <div id="dashboardView" class="view active">
    <div class="list-header">
      <div class="list-title">MEMBER TOOLS</div>
    </div>
    <div class="grid" id="dashboardGrid"></div>
  </div>

  <!-- PAIN ROOM LIST VIEW -->
  <div id="painRoomView" class="view">
    <div class="list-header">
      <div class="list-title" id="listViewTitle">PAIN ROOM</div>
      <button class="btn" onclick="showView('dashboardView')">BACK TO DASHBOARD</button>
    </div>
    <div id="submissionsList"></div>
  </div>

  <!-- SUBMISSION DETAIL VIEW -->
  <div id="detailView" class="view">
    <div class="list-header">
      <div class="list-title">SUBMISSION DETAIL</div>
      <button class="btn" onclick="showView('painRoomView')">BACK TO LIST</button>
    </div>
    <div id="detailContent"></div>
  </div>
</div>

<script>
const STATE = {
  currentView: 'dashboardView',
  currentListType: 'pain',
  currentSubmission: null,
  data: {
    pain: [
      {
        id: 1,
        projectName: 'MAPLE ST FLIP - DISTRESS',
        address: '1247 MAPLE ST',
        city: 'AUSTIN',
        state: 'TX',
        zip: '78704',
        beds: 3,
        baths: 2,
        sqft: 1840,
        ask: 285000,
        arv: 425000,
        repairs: 45000,
        bps: 68.2,
        dqi: 7.4,
        aci: 8.1,
        dom: 94,
        spread: 95000,
        ownerName: 'JAMES WILSON',
        ownerPhone: '512-555-0183',
        ownerEmail: 'JWILSON@EXAMPLE.COM',
        notes: 'MOTIVATED SELLER. FOUNDATION ISSUES. VACANT 6 MONTHS.',
        aiAnalysis: 'HIGH DISTRESS INDICATORS. EST REPAIRS WITHIN 10% OF QUOTE. BELOW MARKET DOM HIGH. BPS SCORE INDICATES MOTIVATION. RECOMMEND IMMEDIATE CONTACT. SPREAD ALLOWS 15% BUFFER.',
        photos: [
          'https://picsum.photos/seed/house1/400/300',
          'https://picsum.photos/seed/house1b/400/300',
          'https://picsum.photos/seed/house1c/400/300',
          'https://picsum.photos/seed/house1d/400/300'
        ]
      },
      {
        id: 2,
        projectName: 'OAK GROVE RENTAL EXIT',
        address: '892 OAK GROVE RD',
        city: 'DALLAS',
        state: 'TX',
        zip: '75201',
        beds: 3,
        baths: 2,
        sqft: 1650,
        ask: 210000,
        arv: 295000,
        repairs: 22000,
        bps: 72.5,
        dqi: 6.8,
        aci: 7.9,
        dom: 41,
        spread: 63000,
        ownerName: 'SARAH CHEN',
        ownerPhone: '214-555-0192',
        ownerEmail: 'SCHEN@EXAMPLE.COM',
        notes: 'TIRED LANDLORD. TENANT VACATING END OF MONTH. COSMETIC ONLY.',
        aiAnalysis: 'MODERATE DEAL QUALITY. CLEAN TITLE EXPECTED. RENTAL HISTORY VERIFIED. COSMETIC REHAB. STRONG NEIGHBORHOOD APPRECIATION. ACI SCORE SUGGESTS QUICK CLOSE POSSIBLE.',
        photos: [
          'https://picsum.photos/seed/house2/400/300',
          'https://picsum.photos/seed/house2b/400/300',
          'https://picsum.photos/seed/house2c/400/300'
        ]
      },
      {
        id: 3,
        projectName: 'BROADWAY INHERITANCE',
        address: '301 BROADWAY AVE',
        city: 'HOUSTON',
        state: 'TX',
        zip: '77002',
        beds: 3,
        baths: 2,
        sqft: 2100,
        ask: 340000,
        arv: 520000,
        repairs: 85000,
        bps: 65.4,
        dqi: 8.2,
        aci: 6.5,
        dom: 127,
        spread: 95000,
        ownerName: 'MICHAEL TORRES',
        ownerPhone: '713-555-0147',
        ownerEmail: 'MTORRES@EXAMPLE.COM',
        notes: 'INHERITED PROPERTY. OUT OF STATE OWNER. MAJOR SYSTEMS OUTDATED.',
        aiAnalysis: 'HIGH SPREAD BUT HIGH REPAIRS. HEIRS MOTIVATED TO LIQUIDATE. ELECTRICAL/HVAC/ROOF NEEDED. DOM EXTENDED DUE TO PRICE. NEGOTIATION ROOM ON ASK LIKELY 10-15%.',
        photos: [
          'https://picsum.photos/seed/house3/400/300',
          'https://picsum.photos/seed/house3b/400/300'
        ]
      }
    ],
    saved: [],
    archived: [],
    deleted: []
  }
};

function formatMoney(num) {
  return '$' + num.toLocaleString('en-US');
}

function updateClock() {
  const now = new Date();
  document.getElementById('time').textContent = now.toTimeString().slice(0,8) + ' CST';
}

function showView(viewId) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById(viewId).classList.add('active');
  STATE.currentView = viewId;
  if (viewId === 'dashboardView') renderDashboard();
  if (viewId === 'painRoomView') renderList(STATE.currentListType);
}

function renderDashboard() {
  const grid = document.getElementById('dashboardGrid');
  const cards = [
    { id: 'pain', title: 'PAIN ROOM', desc: 'ACTIVE SUBMISSIONS', count: STATE.data.pain.length, always: true }
  ];
  
  if (STATE.data.saved.length > 0) {
    cards.push({ id: 'saved', title: 'PAIN SAVED', desc: 'SAVED FOR REVIEW', count: STATE.data.saved.length });
  }
  if (STATE.data.archived.length > 0) {
    cards.push({ id: 'archived', title: 'PAIN ARCHIVED', desc: 'ARCHIVED RECORDS', count: STATE.data.archived.length });
  }
  if (STATE.data.deleted.length > 0) {
    cards.push({ id: 'deleted', title: 'PAIN DELETED', desc: 'DELETED RECORDS', count: STATE.data.deleted.length });
  }
  
  grid.innerHTML = cards.map(card => `
    <div class="card" onclick="openList('${card.id}')">
      <div class="card-title">${card.title}</div>
      <div class="card-count">${card.count}</div>
      <div class="card-desc">${card.desc}</div>
    </div>
  `).join('');
  
  const total = STATE.data.pain.length + STATE.data.saved.length + STATE.data.archived.length + STATE.data.deleted.length;
  document.getElementById('headerStats').innerHTML = `SESSION ACTIVE | TOTAL: ${total} | <span id="time"></span>`;
  updateClock();
}

function openList(type) {
  STATE.currentListType = type;
  const titles = { pain: 'PAIN ROOM', saved: 'PAIN SAVED', archived: 'PAIN ARCHIVED', deleted: 'PAIN DELETED' };
  document.getElementById('listViewTitle').textContent = titles[type];
  showView('painRoomView');
}

function renderList(type) {
  const list = document.getElementById('submissionsList');
  const items = STATE.data[type];
  
  if (items.length === 0) {
    list.innerHTML = '<div class="empty">NO RECORDS FOUND</div>';
    return;
  }
  
  list.innerHTML = items.map(item => `
    <div class="submission-row" onclick="openDetail(${item.id}, '${type}')">
      <img src="${item.photos[0]}" class="thumb" alt="Property">
      <div class="sub-data">
        <div class="data-point">
          <div class="data-label">BED/BA</div>
          <div class="data-value">${item.beds}BD ${item.baths}BA</div>
        </div>
        <div class="data-point">
          <div class="data-label">ASK</div>
          <div class="data-value amber">${formatMoney(item.ask)}</div>
        </div>
        <div class="data-point">
          <div class="data-label">ARV</div>
          <div class="data-value">${formatMoney(item.arv)}</div>
        </div>
        <div class="data-point">
          <div class="data-label">REPAIRS</div>
          <div class="data-value">${formatMoney(item.repairs)}</div>
        </div>
        <div class="data-point">
          <div class="data-label">CITY</div>
          <div class="data-value">${item.city}</div>
        </div>
        <div class="data-point">
          <div class="data-label">STATE</div>
          <div class="data-value">${item.state}</div>
        </div>
      </div>
      ${type !== 'pain' ? `<button class="btn btn-red" onclick="event.stopPropagation(); deleteFromList(${item.id}, '${type}')">DELETE</button>` : ''}
    </div>
  `).join('');
}

function openDetail(id, type) {
  const item = STATE.data[type].find(x => x.id === id);
  if (!item) return;
  STATE.currentSubmission = { id, type };
  
  const content = document.getElementById('detailContent');
  content.innerHTML = `
    <div class="detail-grid">
      <div class="detail-main">
        <div class="project-header">${item.projectName}</div>
        <div class="gallery">
          ${item.photos.map(p => `<img src="${p}" class="gallery-img" alt="Photo">`).join('')}
        </div>
        
        <div class="section">
          <div class="section-title">PROPERTY INFORMATION</div>
          <div class="form-row"><div class="form-label">ADDRESS</div><div class="form-value">${item.address}</div></div>
          <div class="form-row"><div class="form-label">CITY/STATE</div><div class="form-value">${item.city}, ${item.state} ${item.zip}</div></div>
          <div class="form-row"><div class="form-label">BED/BATH</div><div class="form-value">${item.beds} BED / ${item.baths} BATH</div></div>
          <div class="form-row"><div class="form-label">SQFT</div><div class="form-value">${item.sqft.toLocaleString()}</div></div>
          <div class="form-row"><div class="form-label">NOTES</div><div class="form-value">${item.notes}</div></div>
        </div>
        
        <div class="section">
          <div class="section-title">AI ANALYZED INFO</div>
          <div class="ai-box">${item.aiAnalysis}</div>
        </div>
      </div>
      
      <div class="detail-side">
        <div class="section">
          <div class="section-title">DATA METRICS</div>
          <div class="data-grid">
            <div class="metric"><div class="metric-label">ARV</div><div class="metric-value">${formatMoney(item.arv)}</div></div>
            <div class="metric"><div class="metric-label">ASK</div><div class="metric-value">${formatMoney(item.ask)}</div></div>
            <div class="metric"><div class="metric-label">REPAIRS</div><div class="metric-value">${formatMoney(item.repairs)}</div></div>
            <div class="metric"><div class="metric-label">SPREAD</div><div class="metric-value">${formatMoney(item.spread)}</div></div>
            <div class="metric"><div class="metric-label">BPS</div><div class="metric-value">${item.bps}</div></div>
            <div class="metric"><div class="metric-label">DQI</div><div class="metric-value">${item.dqi}</div></div>
            <div class="metric"><div class="metric-label">ACI</div><div class="metric-value">${item.aci}</div></div>
            <div class="metric"><div class="metric-label">DOM</div><div class="metric-value">${item.dom}</div></div>
          </div>
        </div>
        
        <div class="section">
          <div class="section-title">CONTACT INFO</div>
          <div class="form-row"><div class="form-label">OWNER</div><div class="form-value">${item.ownerName}</div></div>
          <div class="form-row"><div class="form-label">PHONE</div><div class="form-value">${item.ownerPhone}</div></div>
          <div class="form-row"><div class="form-label">EMAIL</div><div class="form-value">${item.ownerEmail}</div></div>
        </div>
        
        <div class="section">
          <div class="section-title">ACTIONS</div>
          <div class="actions">
            ${type === 'pain' ? `
              <button class="btn btn-green" onclick="moveSubmission('saved')">SAVE</button>
              <button class="btn" onclick="moveSubmission('archived')">ARCHIVE</button>
              <button class="btn btn-red" onclick="moveSubmission('deleted')">DELETE</button>
              <button class="btn" onclick="messageOwner('${item.ownerEmail}')">MESSAGE OWNER</button>
            ` : `
              <button class="btn btn-red" onclick="deleteFromList(${item.id}, '${type}')">DELETE</button>
            `}
            <button class="btn" onclick="showView('dashboardView')">BACK TO DASHBOARD</button>
          </div>
        </div>
      </div>
    </div>
  `;
  
  showView('detailView');
}

function moveSubmission(targetType) {
  const { id, type } = STATE.currentSubmission;
  const idx = STATE.data[type].findIndex(x => x.id === id);
  if (idx === -1) return;
  
  const item = STATE.data[type].splice(idx, 1)[0];
  STATE.data[targetType].push(item);
  
  openList(targetType);
}

function deleteFromList(id, type) {
  const idx = STATE.data[type].findIndex(x => x.id === id);
  if (idx === -1) return;
  
  if (type === 'pain') {
    const item = STATE.data[type].splice(idx, 1)[0];
    STATE.data.deleted.push(item);
  } else {
    STATE.data[type].splice(idx, 1);
  }
  
  renderList(type);
  if (STATE.data[type].length === 0 && type !== 'pain') {
    showView('dashboardView');
  }
}

function messageOwner(email) {
  window.location.href = `mailto:${email}?subject=RE: PAIN ROOM SUBMISSION`;
}

// Init
setInterval(updateClock, 1000);
updateClock();
renderDashboard();
</script>
<script>(function(){document.addEventListener("click",function(e){var a=e.target.closest("[data-product-id]");if(!a)return;e.preventDefault();var pid=a.getAttribute("data-product-id");if(pid)parent.postMessage({type:"ecto-artifact-link-click",productId:pid},"*")})})();</script>
</body>
</html>
